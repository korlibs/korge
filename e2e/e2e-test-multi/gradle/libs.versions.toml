[versions]
korge = "7.0.0-SNAPSHOT"
korlibs = "7.0.0-SNAPSHOT"
kotlin = "2.3.21"
kotlinx-serialization = "1.11.0"
ktor = "3.5.1"
logback = "1.5.37"

[plugins]
korge-library = { id = "org.korge.engine.library", version = "7.0.0-SNAPSHOT" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }

[libraries]
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinx-serialization" }
korlibs-image = { module = "org.korge.korlibs:korlibs-image", version.ref = "korlibs" }
korge-engine = { module = "org.korge.engine:korge", version.ref = "korge" }
ktor-server-netty = { module = "io.ktor:ktor-server-netty", version.ref = "ktor" }
logback = { "module" = "ch.qos.logback:logback-classic", version.ref = "logback" }
