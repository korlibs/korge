plugins {
    id "org.jetbrains.kotlin.jvm" version "2.3.21"
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_11
    }
}

java {
    targetCompatibility = JavaVersion.VERSION_11
