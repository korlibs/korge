name: Run checks

on:
  push:
    branches: [ main, 'release/**' ]
    paths:
      - '**'
      - '!**.gitignore'
      - '!**.md'
      - '!**.github/workflows/*'
  pull_request:
    branches: [ main, 'release/**' ]
    paths:
      - '**'
      - '!**.gitignore'
      - '!**.md'
      - '!**.github/workflows/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DISPLAY: ":99"
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: zulu
  ENABLE_BENCHMARKS: false

jobs:
  test-linux:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    env:
      DISABLE_KOTLIN_NATIVE: false
      DISABLE_ANDROID: false
      DISABLE_SANDBOX: false
    steps:
      - uses: actions/checkout@v4
      - name: Install freeglut3 & openal
        run: sudo apt-get update && sudo apt-get -y install freeglut3-dev libopenal-dev xvfb
      - name: Run Xvfb in Background
        run: "Xvfb :99 &"
      - name: Set up JDK
        uses: actions/setup-java@6a0805fcefea3d4657a47ac4c165951e33482018
        with:
          distribution: "${{ env.JAVA_DISTRIBUTION }}"
          java-version: "${{ env.JAVA_VERSION }}" # https://github.com/actions/setup-java/releases/tag/v4.2.2
      - name: Prepare Gradle
        uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5 # https://github.com/gradle/actions/releases/tag/v3.1.0
      - name: "Run check"
        run: "./gradlew check"
        env:
          EGL_LOG_LEVEL: debug
          LIBGL_DEBUG: verbose
          LIBGL_ALWAYS_SOFTWARE: true
          MESA_DEBUG: true
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: "Run Android Tests"
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed
        with:
          "api-level": 21
          "script": "./gradlew connectedCheck" # https://github.com/ReactiveCircus/android-emulator-runner/releases/tag/v2.34.0
      - name: Archive Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "test-results-ubuntu-latest"
          retention-days: 21
          path: "**/build/reports"
          if-no-files-found: ignore

  test-macos:
    timeout-minutes: 120
    runs-on: macos-latest
    env:
      DISABLE_KOTLIN_NATIVE: false
      DISABLE_ANDROID: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@6a0805fcefea3d4657a47ac4c165951e33482018
        with:
          distribution: "${{ env.JAVA_DISTRIBUTION }}"
          java-version: "${{ env.JAVA_VERSION }}" # https://github.com/actions/setup-java/releases/tag/v4.2.2
      - name: Prepare Gradle
        uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5 # https://github.com/gradle/actions/releases/tag/v3.1.0
      - name: "Run check"
        run: "./gradlew check"
        env:
          EGL_LOG_LEVEL: debug
          LIBGL_DEBUG: verbose
          LIBGL_ALWAYS_SOFTWARE: true
          MESA_DEBUG: true
      - name: Archive Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "test-results-macos-latest"
          retention-days: 21
          path: "**/build/reports"
          if-no-files-found: ignore

  test-windows:
    timeout-minutes: 120
    runs-on: windows-latest
    env:
      DISABLE_KOTLIN_NATIVE: true
      DISABLE_ANDROID: true
      # DISABLE_SANDBOX: false # sandbox enabled for all targets
    steps:
      - uses: actions/checkout@v4
      - name: Download and unzip opengl
        shell: cmd
        run: "curl -L -o opengl32-x64.zip https://github.com/korlibs/mesa-dist-win/releases/download/21.2.3/opengl32-x64.zip && unzip opengl32-x64.zip && unzip opengl32-x64.zip -d korge"
      - name: Set up JDK
        uses: actions/setup-java@6a0805fcefea3d4657a47ac4c165951e33482018
        with:
          distribution: "${{ env.JAVA_DISTRIBUTION }}"
          java-version: "${{ env.JAVA_VERSION }}" # https://github.com/actions/setup-java/releases/tag/v4.2.2
      - name: Prepare Gradle
        uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5 # https://github.com/gradle/actions/releases/tag/v3.1.0
      - name: "Run check"
        run: "./gradlew check"
        env:
          EGL_LOG_LEVEL: debug
          LIBGL_DEBUG: verbose
          LIBGL_ALWAYS_SOFTWARE: true
          MESA_DEBUG: true
      - name: Archive Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "test-results-windows-latest"
          retention-days: 21
          path: "**/build/reports"
          if-no-files-found: ignore
