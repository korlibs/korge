name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      forced_version:
        description: 'FORCED_VERSION to use'
        required: true
        type: string

env:
  CI: true
  FORCED_VERSION: ${{ inputs.forced_version || github.ref }}
  # Vanniktech maven-publish plugin reads these exact Gradle project property names for signing
  ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGKEY }}
  ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGPASSWORD }}
  # Vanniktech maven-publish plugin reads these for Central Portal auth
  ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_KORGE_SONATYPE_USERNAME }}
  ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_KORGE_SONATYPE_PASSWORD }}
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: zulu

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: "Use Node.js 24.x"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # https://github.com/actions/setup-node/releases/tag/v6.3.0
        with:
          node-version: 24.x
      - name: "Set up JDK"
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # https://github.com/actions/setup-java/releases/tag/v5.2.0
        with:
          distribution: "${{ env.JAVA_DISTRIBUTION }}"
          java-version: "${{ env.JAVA_VERSION }}"
      - name: "Prepare Gradle"
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # https://github.com/gradle/actions/releases/tag/v6.0.1
      - name: "Initialize Gradle"
        run: "./gradlew --no-configuration-cache"
      - name: "Publish to Maven Central"
        run: "./gradlew --no-configuration-cache publishToMavenCentral"
